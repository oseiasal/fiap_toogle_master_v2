{{- range $name, $service := .Values.services }}
{{- if $service.dbUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-service-secret
type: Opaque
data:
  DATABASE_URL: {{ $service.dbUrl }}
  {{- if $service.masterKey }}
  MASTER_KEY: {{ $service.masterKey }}
  {{- end }}
---
{{- end }}
{{- if eq $name "evaluation" }}
apiVersion: v1
kind: Secret
metadata:
  name: evaluation-service-secret
type: Opaque
data:
  REDIS_URL: {{ $service.redisUrl }}
  AWS_SQS_URL: {{ $service.sqsUrl }}
  SERVICE_API_KEY: {{ $service.apiKey }}
---
{{- end }}
{{- if eq $name "analytics" }}
apiVersion: v1
kind: Secret
metadata:
  name: analytics-service-secret
type: Opaque
data:
  AWS_SQS_URL: {{ $service.sqsUrl }}
---
{{- end }}
{{- end }}
