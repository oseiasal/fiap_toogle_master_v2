apiVersion: v1
kind: ConfigMap
metadata:
  name: evaluation-service-config
  namespace: toogle-master
data:
  PORT: "8004"
  FLAG_SERVICE_URL: "http://flag-service.toogle-master.svc.cluster.local:8002"
  TARGETING_SERVICE_URL: "http://targeting-service.toogle-master.svc.cluster.local:8003"
  AWS_REGION: "us-east-1"

---
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: toogle-master
spec:
  selector:
    app: evaluation-service
  ports:
    - protocol: TCP
      port: 8004
      targetPort: 8004
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: toogle-master
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
      - name: evaluation-service
        image: 112719111297.dkr.ecr.us-east-1.amazonaws.com/evaluation-service:latest
        ports:
        - containerPort: 8004
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: evaluation-service-config
              key: PORT
        - name: FLAG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: evaluation-service-config
              key: FLAG_SERVICE_URL
        - name: TARGETING_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: evaluation-service-config
              key: TARGETING_SERVICE_URL
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: evaluation-service-config
              key: AWS_REGION
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: evaluation-service-secret
              key: REDIS_URL
        - name: AWS_SQS_URL
          valueFrom:
            secretKeyRef:
              name: evaluation-service-secret
              key: AWS_SQS_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: evaluation-service-secret
              key: AWS_ACCESS_KEY_ID
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: evaluation-service-secret
              key: AWS_SECRET_ACCESS_KEY
              optional: true
        - name: AWS_SESSION_TOKEN
          valueFrom:
            secretKeyRef:
              name: evaluation-service-secret
              key: AWS_SESSION_TOKEN
              optional: true
        - name: SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: evaluation-service-secret
              key: SERVICE_API_KEY
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: evaluation-service-hpa
  namespace: toogle-master
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: evaluation-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
